      const ImageGenerator = ({ defaultPrompt = "" }) => {
    const [prompt, setPrompt] = useState(defaultPrompt);
    const [loading, setLoading] = useState(false);
    const [imageUrl, setImageUrl] = useState(null);
    const [error, setError] = useState(null);

    const generateImage = async () => {
        if (!prompt.trim()) { setError("Veuillez entrer une description"); return; }
        setError(null);
        setImageUrl(null);
        setLoading(true);
        try {
            const response = await fetch('/api/image', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ prompt })
            });
            if (!response.ok) throw new Error('Erreur');
            const blob = await response.blob();
            setImageUrl(URL.createObjectURL(blob));
        } catch (e) {
            setError("Erreur génération. Réessayez.");
        }
        setLoading(false);
    };

    return (
        <div className="my-8 bg-gradient-to-br from-purple-500/10 to-pink-500/10 border border-purple-500/30 rounded-xl p-6">
            <div className="flex items-center gap-2 mb-4">

                <h4 className="text-lg font-bold text-purple-300">🎨 Pratique Instantanée</h4>
            </div>
            <textarea
                value={prompt}
                onChange={(e) => setPrompt(e.target.value)}
                className="w-full bg-black/40 border border-white/20 rounded-lg p-4 text-white placeholder-gray-500 focus:border-purple-500 focus:outline-none resize-none"
                rows="3"
                placeholder="Décrivez votre image..."
            />
            <button
                onClick={generateImage}
                disabled={loading}
                className="mt-4 w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-3 rounded-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"

                        Génération en cours...
                    </>
                ) : (
                    <>
                        <Sparkles size={20} />
                        Générer l'image
                    </>
                )}
            </button>

            {error && (
                <div className="mt-4 bg-red-500/20 border border-red-500/50 text-red-300 p-3 rounded-lg text-sm">
                    {error}
                </div>
            )}

            {loading && !imageUrl && (
                <div className="mt-6 aspect-square rounded-lg overflow-hidden loading-shimmer"></div>
            )}

            {imageUrl && (
                <div className="mt-6 space-y-4">
                    <img
                        src={imageUrl}
                        alt="Generated"
                        onLoad={() => setLoading(false)}
                        onError={() => {
                            setLoading(false);
                            setError("Erreur génération. Réessayez.");
                            setImageUrl(null);

                        className={`w-full rounded-lg shadow-2xl border-2 border-purple-500/50 ${loading ? 'hidden' : 'block'}`}

   {!loading && (

    >

    </a>  
)}

                    <p className="text-sm text-gray-400 mb-4">Cliquez sur les mots surlignés pour changer le prompt.</p>
                    <div className="bg-white/10 p-4 rounded-lg font-mono text-lg md:text-xl leading-relaxed">
                        <span className="text-gray-400">Prompt: </span> Portrait de <button onClick={() => cycleOption('sujet')} className="mx-1 px-2 py-0.5 bg-white/20 hover:bg-white/30 text-white rounded-full border border-white/30 google-chip cursor-pointer inline-flex items-center gap-1">{chips.sujet} <span className="text-xs opacity-50">▼</span></button> portant des <button onClick={() => cycleOption('details')} className="mx-1 px-2 py-0.5 bg-white/20 hover:bg-white/30 text-white rounded-full border border-white/30 google-chip cursor-pointer inline-flex items-center gap-1">{chips.details} <span className="text-xs opacity-50">▼</span></button>, ambiance <button onClick={() => cycleOption('style')} className="mx-1 px-2 py-0.5 bg-white/20 hover:bg-white/30 text-white rounded-full border border-white/30 google-chip cursor-pointer inline-flex items-center gap-1">{chips.style} <span className="text-xs opacity-50">▼</span></button>, à <button onClick={() => cycleOption('fond')} className="mx-1 px-2 py-0.5 bg-white/20 hover:bg-white/30 text-white rounded-full border border-white/30 google-chip cursor-pointer inline-flex items-center gap-1">{chips.fond} <span className="text-xs opacity-50">▼</span></button>.
                    </div>
                </div>
            );
        };

        const TrainingSchedule = () => (
            <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6">
                <div className="bg-white/5 border border-white/10 p-5 rounded-xl hover:bg-white/10 transition-colors"><div className="text-yellow-500 font-bold mb-2">Lundi : Le Remix</div><p className="text-sm text-gray-300">Générez un masque Gelede. Transformez la matière.</p></div>
                <div className="bg-white/5 border border-white/10 p-5 rounded-xl hover:bg-white/10 transition-colors"><div className="text-teal-500 font-bold mb-2">Mardi : La Texture</div><p className="text-sm text-gray-300">Créez un fond d'écran unique.</p></div>
                <div className="bg-white/5 border border-white/10 p-5 rounded-xl hover:bg-white/10 transition-colors"><div className="text-purple-500 font-bold mb-2">Mercredi : Le Logo</div><p className="text-sm text-gray-300">Créez une enseigne avec texte lisible.</p></div>
            </div>
        );

        const SupportButton = () => (
            <a 
                href={`https://wa.me/${coachWhatsapp}?text=${encodeURIComponent(welcomeMessage)}`}
                target="_blank"
                rel="noopener noreferrer"
                className="fixed bottom-6 right-6 z-50 group flex items-center justify-center"
            >
                <div className="absolute inset-0 bg-green-500 rounded-full wa-pulse opacity-75"></div>
                <div className="relative bg-[#25D366] hover:bg-[#20bd5a] text-white p-4 rounded-full shadow-2xl transition-all transform group-hover:scale-110 flex items-center gap-2">
                    <MessageCircle size={28} fill="white" className="text-white" />
                    <span className="max-w-0 overflow-hidden group-hover:max-w-xs transition-all duration-300 ease-out whitespace-nowrap font-bold text-sm">
                        SOS Coach
                    </span>
                </div>
            </a>
        );

        const App = () => {
            const moduleRefs = Array(8).fill(0).map(() => React.createRef());
            const [completedModules, setCompletedModules] = useState(() => { try { const saved = localStorage.getItem('iafacile_progress_v2'); return saved ? JSON.parse(saved) : []; } catch (e) { return []; } });
            const totalModules = 8;
            
            useEffect(() => {
                localStorage.setItem('iafacile_progress_v2', JSON.stringify(completedModules));
                if (completedModules.length === totalModules && window.confetti) {
                    const duration = 3 * 1000;
                    const animationEnd = Date.now() + duration;
                    const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };
                    const randomInRange = (min, max) => Math.random() * (max - min) + min;
                    const interval = setInterval(function() {
                        const timeLeft = animationEnd - Date.now();
                        if (timeLeft <= 0) return clearInterval(interval);
                        const particleCount = 50 * (timeLeft / duration);
                        window.confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                        window.confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
                    }, 250);
                }
            }, [completedModules]);
            
            const toggleModule = (id) => { setCompletedModules(prev => { if (prev.includes(id)) { return prev.filter(m => m !== id); } else { return [...prev, id]; } }); };
            const progress = (completedModules.length / totalModules) * 100;
            const isFinished = completedModules.length === totalModules;
            const scrollToModule = (index) => { if(moduleRefs[index] && moduleRefs[index].current) { moduleRefs[index].current.scrollIntoView({ behavior: 'smooth' }); } };

            return (
                <div className="min-h-screen text-gray-100 selection:bg-yellow-500 selection:text-black">
                    <Header scrollToModule={scrollToModule} progress={progress} />
                    <Hero startCourse={() => scrollToModule(0)} />
                    <SupportButton />

                    <div className="max-w-4xl mx-auto px-4 py-16 space-y-24">
                        <div ref={moduleRefs[0]}>
                            <ModuleCard id={1} number="1" title="La Nouvelle Sorcellerie" icon={Sparkles} color="purple" isCompleted={completedModules.includes(1)} onToggleComplete={toggleModule}>
                                <p className="text-lg">On arrête d'appeler ça un "logiciel". C'est une <strong>mise à jour de puissance</strong> pour le créateur africain.</p>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 my-6">
                                    <div className="bg-black/30 p-4 rounded-lg border-l-4 border-red-500"><h3 className="font-bold text-white mb-2">Ce n'est pas...</h3><p className="text-sm">Un robot qui vole votre travail.</p></div>
                                    <div className="bg-black/30 p-4 rounded-lg border-l-4 border-green-500"><h3 className="font-bold text-white mb-2">C'est...</h3><p className="text-sm">Un studio de 50 artistes dans votre poche.</p></div>
                                </div>
                                <ImageGenerator defaultPrompt="Un masque Gelede traditionnel béninois transformé en sculpture de verre transparent, lumière néon violet, fond sombre" />
                            </ModuleCard>
                        </div>

                        <div ref={moduleRefs[1]}>
                            <ModuleCard id={2} number="2" title="La Boucle Créative" icon={Repeat} color="yellow" isCompleted={completedModules.includes(2)} onToggleComplete={toggleModule}>
                                <p>Le Framework en 3 Étapes pour passer de l'idée à l'icône.</p>
                                <div className="flex flex-col md:flex-row gap-4 my-8">
                                    <div className="flex-1 bg-white/5 p-4 rounded-lg border border-white/10"><div className="text-2xl font-bold text-yellow-500 mb-1">01</div><div className="font-bold text-white mb-2">Capturer</div><p className="text-sm">Observer les détails autour de vous.</p></div><div className="hidden md:flex items-center text-gray-600"><ArrowRight /></div>
                                    <div className="flex-1 bg-white/5 p-4 rounded-lg border border-white/10"><div className="text-2xl font-bold text-yellow-500 mb-1">02</div><div className="font-bold text-white mb-2">Casser</div><p className="text-sm">[Sujet] + [Détails] + [Style].</p></div><div className="hidden md:flex items-center text-gray-600"><ArrowRight /></div>
                                    <div className="flex-1 bg-white/5 p-4 rounded-lg border border-white/10"><div className="text-2xl font-bold text-yellow-500 mb-1">03</div><div className="font-bold text-white mb-2">Créer</div><p className="text-sm">Changez un mot, changez tout.</p></div>
                                </div>
                                <ChipSimulator />
                                <div className="bg-yellow-500/10 border border-yellow-500/30 p-4 rounded-lg mt-6"><strong className="text-yellow-500 flex items-center gap-2 mb-2"><Flag size={18}/> Mission 01</strong><p className="text-sm font-mono bg-black/50 p-3 rounded text-gray-300 mb-4">"Une version cyberpunk de la place de l'Étoile Rouge à Cotonou, néons, nuit pluvieuse, style anime."</p></div>
                                <ImageGenerator defaultPrompt="Une version cyberpunk de la place de l'Étoile Rouge à Cotonou, néons, nuit pluvieuse, style anime" />
                            </ModuleCard>
                        </div>

                        <div ref={moduleRefs[2]}>
                            <ModuleCard id={3} number="3" title="L'Alchimie Avancée" icon={Cpu} color="blue" isCompleted={completedModules.includes(3)} onToggleComplete={toggleModule}>
                                <div className="space-y-8">
                                    <div><h3 className="flex items-center gap-2 font-bold text-white text-lg mb-2"><Lock size={18} className="text-blue-400"/> Le "Seed Lock"</h3><p>Gardez le prompt, changez juste un détail.</p></div>
                                    <div><h3 className="flex items-center gap-2 font-bold text-white text-lg mb-2"><span className="text-blue-400">Aa</span> Le Texte dans l'Image</h3><p className="mb-4">L'IA moderne excelle avec l'écriture.</p></div>
                                </div>
                                <ImageGenerator defaultPrompt="Une boutique de rue à Cotonou, panneau en bois écrit 'IA FACILE' en lettres peintes à la main, style réaliste, détails précis" />
                            </ModuleCard>
                        </div>

                        <div ref={moduleRefs[3]}>
                            <ModuleCard id={4} number="4" title="Zéro à Héros" icon={Camera} color="green" isCompleted={completedModules.includes(4)} onToggleComplete={toggleModule}>
                                <p>La créativité est un muscle. Voici votre routine de 10 minutes.</p>
                                <TrainingSchedule />
                                <ImageGenerator defaultPrompt="Tissu bogolan traditionnel en gros plan, motifs géométriques détaillés, texture haute définition, fond d'écran 4K" />
                            </ModuleCard>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div ref={moduleRefs[4]} className="col-span-1"><ModuleCard id={5} number="5" title="Inspiration" icon={Palette} color="purple" isCompleted={completedModules.includes(5)} onToggleComplete={toggleModule}><h3 className="text-xl font-bold font-heading mb-2">L'Architecte du Futur</h3><p className="text-sm text-gray-400 mb-4">Visualisez le futur en 30 secondes.</p></ModuleCard></div>
                            <div ref={moduleRefs[5]} className="col-span-1"><ModuleCard id={6} number="6" title="Éthique" icon={ShieldCheck} color="green" isCompleted={completedModules.includes(6)} onToggleComplete={toggleModule}><h3 className="text-xl font-bold font-heading mb-2">Le Test d'Originalité</h3><p className="text-sm text-gray-400 mb-4">Votre valeur est le <strong>Concept</strong> et la <strong>Curation</strong>.</p></ModuleCard></div>
                            <div ref={moduleRefs[6]} className="col-span-1 md:col-span-2"><ModuleCard id={7} number="7" title="Futur-Proofing" icon={Film} color="red" isCompleted={completedModules.includes(7)} onToggleComplete={toggleModule}><h3 className="text-xl font-bold font-heading">Bientôt : Vidéo IA</h3><p className="text-sm text-gray-400 mt-2 max-w-lg">Maîtrisez le texte maintenant pour maîtriser le cinéma demain.</p></ModuleCard></div>
                        </div>

                        <div ref={moduleRefs[7]} className="text-center py-12">
                            <div className="relative">
                                {isFinished && (<div className="absolute -top-20 left-1/2 transform -translate-x-1/2 flex flex-col items-center animate-bounce"><Trophy size={64} className="text-yellow-400 drop-shadow-lg" /><span className="bg-yellow-500 text-black px-4 py-1 rounded-full font-bold text-sm mt-2">COURS TERMINÉ !</span></div>)}
                                <h2 className="text-4xl md:text-5xl font-heading font-bold mb-6 text-white">Votre Projet Final</h2>
                                <p className="text-xl text-gray-400 mb-10">Créez votre portfolio maintenant.</p>
                                <div className={`bg-gradient-to-br from-yellow-500 to-orange-600 p-1 rounded-2xl max-w-2xl mx-auto shadow-2xl shadow-orange-500/20 transition-all ${isFinished ? 'scale-105 ring-4 ring-yellow-400/50' : ''}`}>
                                    <div className="bg-[#0f0f13] rounded-xl p-8">
                                        <div className="flex justify-between items-start mb-6"><h3 className="text-2xl font-bold text-white">🏆 Challenge Final</h3><button onClick={() => toggleModule(8)} className={`flex items-center gap-2 px-3 py-1 rounded-full text-xs font-bold transition-all ${completedModules.includes(8) ? 'bg-green-500 text-black' : 'bg-white/10 text-gray-400 hover:bg-white/20'}`}>{completedModules.includes(8) ? 'Accompli' : 'Marquer fait'}</button></div>
                                        <ol className="text-left space-y-4 mb-8 text-gray-300"><li className="flex gap-3"><span className="bg-white/10 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shrink-0">1</span>Créez 5 images racontant une histoire.</li><li className="flex gap-3"><span className="bg-white/10 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shrink-0">2</span>Téléchargez-les.</li><li className="flex gap-3"><span className="bg-white/10 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold shrink-0">3</span>Postez avec <strong>#IAFacile</strong>.</li></ol>
                                        <ImageGenerator defaultPrompt="Une série narrative: Le marché Dantokpa au lever du soleil, style photographique documentaire, lumière douce" />
                                    </div>
                                </div>
                            </div>
                            <p className="mt-12 text-gray-500 text-sm">Vous n'êtes plus spectateur. Vous êtes créateur.</p>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
